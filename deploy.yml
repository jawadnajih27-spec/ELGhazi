# ════════════════════════════════════════════════════════════════
# ELGhazi_Blog — GitHub Actions: Deploy to GitHub Pages
# ════════════════════════════════════════════════════════════════
# يُشغَّل تلقائياً عند كل push على main (سواء يدوي أو عبر API)
# المسار: لوحة التحكم ← GitHub API (PUT data.json) ← هذا الـ workflow يُعيد النشر
# ════════════════════════════════════════════════════════════════

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate data.json
        run: |
          python3 -c "
          import json, sys
          with open('data.json') as f: d = json.load(f)
          n = len(d.get('posts',[]))
          print(f'✓ data.json valid — {n} post(s)')
          "

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4

      - run: echo "✓ Live → ${{ steps.deploy.outputs.page_url }}"
