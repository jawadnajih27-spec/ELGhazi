<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أجندتي - إدارة الوقت والمهام</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#5D8AA8">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5D8AA8;
            --primary-light: #8FBCD4;
            --secondary: #F4A261;
            --bg: #F8F9FA;
            --surface: #FFFFFF;
            --text: #2D3748;
            --text-light: #718096;
            --success: #68D391;
            --danger: #FC8181;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #E8F4F8 0%, #F8F9FA 100%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0 30px;
        }

        h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .date-display {
            color: var(--text-light);
            font-size: 1.1rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--surface);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .input-section {
            background: var(--surface);
            padding: 25px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"], input[type="time"], select {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
            background: var(--bg);
        }

        input[type="text"]:focus, input[type="time"]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--surface);
        }

        button {
            padding: 14px 28px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: var(--primary-light);
            transform: scale(1.02);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: var(--surface);
            padding: 8px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            color: var(--text-light);
            border-radius: 10px;
            font-weight: 500;
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        .content-section {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 25px;
            min-height: 300px;
        }

        .task-item, .note-item {
            display: flex;
            align-items: center;
            padding: 18px;
            background: var(--bg);
            border-radius: 12px;
            margin-bottom: 12px;
            transition: all 0.3s;
            border-right: 4px solid transparent;
        }

        .task-item:hover, .note-item:hover {
            border-right-color: var(--primary);
            transform: translateX(-5px);
        }

        .task-item.completed {
            opacity: 0.6;
            text-decoration: line-through;
            border-right-color: var(--success);
        }

        .task-checkbox {
            width: 24px;
            height: 24px;
            margin-left: 15px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .task-content {
            flex: 1;
        }

        .task-time {
            font-size: 0.85rem;
            color: var(--secondary);
            font-weight: 600;
            margin-top: 4px;
        }

        .priority-high { border-right-color: var(--danger) !important; }
        .priority-medium { border-right-color: var(--secondary) !important; }
        .priority-low { border-right-color: var(--success) !important; }

        .delete-btn {
            background: transparent;
            color: var(--danger);
            padding: 8px 12px;
            font-size: 1.2rem;
        }

        .delete-btn:hover {
            background: #FED7D7;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .hidden { display: none; }

        .pomodoro-section {
            text-align: center;
            padding: 40px;
        }

        .timer-display {
            font-size: 5rem;
            font-weight: 700;
            color: var(--primary);
            margin: 30px 0;
            font-variant-numeric: tabular-nums;
        }

        .timer-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .timer-btn {
            padding: 15px 30px;
            border-radius: 50px;
        }

        .timer-btn.secondary {
            background: var(--bg);
            color: var(--text);
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .stats { grid-template-columns: 1fr; }
            .input-group { flex-direction: column; }
            .timer-display { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📅 أجندتي</h1>
            <div class="date-display" id="currentDate"></div>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalTasks">0</div>
                <div class="stat-label">المهام الكلية</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completedTasks">0</div>
                <div class="stat-label">المكتملة</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingTasks">0</div>
                <div class="stat-label">المتبقية</div>
            </div>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="أضف مهمة جديدة...">
                <input type="time" id="taskTime">
                <select id="taskPriority">
                    <option value="low">🟢 منخفض</option>
                    <option value="medium" selected>🟠 متوسط</option>
                    <option value="high">🔴 عالي</option>
                </select>
                <button onclick="addTask()">إضافة</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('tasks')">📋 المهام</button>
            <button class="tab" onclick="switchTab('notes')">📝 الملاحظات</button>
            <button class="tab" onclick="switchTab('pomodoro')">⏱️ بومودورو</button>
        </div>

        <div class="content-section">
            <div id="tasksTab" class="tab-content">
                <div id="tasksList"></div>
            </div>

            <div id="notesTab" class="tab-content hidden">
                <div class="input-group" style="margin-bottom: 20px;">
                    <input type="text" id="noteInput" placeholder="أضف ملاحظة سريعة...">
                    <button onclick="addNote()">حفظ</button>
                </div>
                <div id="notesList"></div>
            </div>

            <div id="pomodoroTab" class="tab-content hidden">
                <div class="pomodoro-section">
                    <h2>تقنية بومودورو للتركيز</h2>
                    <div class="timer-display" id="timer">25:00</div>
                    <div class="timer-controls">
                        <button class="timer-btn" onclick="startTimer()">▶️ بدء</button>
                        <button class="timer-btn secondary" onclick="pauseTimer()">⏸️ إيقاف</button>
                        <button class="timer-btn secondary" onclick="resetTimer()">🔄 إعادة</button>
                    </div>
                    <p style="margin-top: 30px; color: var(--text-light);">
                        25 دقيقة عمل | 5 دقيقة راحة
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // البيانات
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let notes = JSON.parse(localStorage.getItem('notes')) || [];
        let timerInterval;
        let timeLeft = 25 * 60;
        let isRunning = false;

        // تهيئة التطبيق
        document.addEventListener('DOMContentLoaded', () => {
            updateDate();
            renderTasks();
            renderNotes();
            updateStats();

            // Enter key support
            document.getElementById('taskInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addTask();
            });
            document.getElementById('noteInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addNote();
            });
        });

        // تحديث التاريخ
        function updateDate() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('ar-SA', options);
        }

        // تبديل التبويبات
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));

            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.remove('hidden');
        }

        // إدارة المهام
        function addTask() {
            const input = document.getElementById('taskInput');
            const time = document.getElementById('taskTime');
            const priority = document.getElementById('taskPriority');

            if (!input.value.trim()) return;

            const task = {
                id: Date.now(),
                text: input.value,
                time: time.value,
                priority: priority.value,
                completed: false,
                date: new Date().toISOString().split('T')[0]
            };

            tasks.push(task);
            saveTasks();
            renderTasks();
            updateStats();

            input.value = '';
            time.value = '';
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
            updateStats();
        }

        function renderTasks() {
            const list = document.getElementById('tasksList');
            const today = new Date().toISOString().split('T')[0];
            const todayTasks = tasks.filter(t => t.date === today);

            if (todayTasks.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                        <p>لا توجد مهام لهذا اليوم</p>
                        <p style="font-size: 0.9rem; margin-top: 10px;">أضف مهمة جديدة للبدء!</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = todayTasks.sort((a, b) => {
                if (a.completed !== b.completed) return a.completed ? 1 : -1;
                if (a.time && b.time) return a.time.localeCompare(b.time);
                return b.id - a.id;
            }).map(task => `
                <div class="task-item ${task.completed ? 'completed' : ''} priority-${task.priority}">
                    <input type="checkbox" class="task-checkbox" 
                           ${task.completed ? 'checked' : ''} 
                           onchange="toggleTask(${task.id})">
                    <div class="task-content">
                        <div>${task.text}</div>
                        ${task.time ? `<div class="task-time">🕐 ${task.time}</div>` : ''}
                    </div>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">🗑️</button>
                </div>
            `).join('');
        }

        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            const todayTasks = tasks.filter(t => t.date === today);
            document.getElementById('totalTasks').textContent = todayTasks.length;
            document.getElementById('completedTasks').textContent = todayTasks.filter(t => t.completed).length;
            document.getElementById('pendingTasks').textContent = todayTasks.filter(t => !t.completed).length;
        }

        // إدارة الملاحظات
        function addNote() {
            const input = document.getElementById('noteInput');
            if (!input.value.trim()) return;

            const note = {
                id: Date.now(),
                text: input.value,
                date: new Date().toLocaleString('ar-SA')
            };

            notes.unshift(note);
            localStorage.setItem('notes', JSON.stringify(notes));
            renderNotes();
            input.value = '';
        }

        function deleteNote(id) {
            notes = notes.filter(n => n.id !== id);
            localStorage.setItem('notes', JSON.stringify(notes));
            renderNotes();
        }

        function renderNotes() {
            const list = document.getElementById('notesList');
            if (notes.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                        </svg>
                        <p>لا توجد ملاحظات</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = notes.map(note => `
                <div class="note-item">
                    <div class="task-content">
                        <div>${note.text}</div>
                        <div style="font-size: 0.8rem; color: var(--text-light); margin-top: 5px;">${note.date}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteNote(${note.id})">🗑️</button>
                </div>
            `).join('');
        }

        // مؤقت بومودورو
        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateTimerDisplay();
                } else {
                    pauseTimer();
                    alert('انتهى الوقت! خذ استراحة قصيرة.');
                }
            }, 1000);
        }

        function pauseTimer() {
            isRunning = false;
            clearInterval(timerInterval);
        }

        function resetTimer() {
            pauseTimer();
            timeLeft = 25 * 60;
            updateTimerDisplay();
        }

        // تسجيل Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript,').catch(() => {});
        }
    </script>
</body>
</html>
