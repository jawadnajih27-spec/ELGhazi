<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المتجر | NJSERVICES</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f1623;
            --bg-soft: #161f2e;
            --surface: #1e2a3d;
            --surface-2: #243247;
            --border: rgba(99, 102, 241, 0.18);
            --primary: #6366f1;
            --primary-soft: rgba(99, 102, 241, 0.12);
            --accent: #22d3ee;
            --accent-soft: rgba(34, 211, 238, 0.12);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --success: #4ade80;
            --danger: #f87171;
            --warning: #fbbf24;
            --shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Lock Screen */
        .lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .lock-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .lock-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            background: var(--primary-soft);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lock-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .lock-subtitle {
            color: var(--muted);
            margin-bottom: 2rem;
        }

        .lock-input {
            width: 100%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }

        .lock-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .lock-input.error {
            border-color: var(--danger);
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .lock-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lock-btn:hover {
            background: var(--accent);
        }

        .lock-error {
            color: var(--danger);
            font-size: 0.9rem;
            margin-top: 0.5rem;
            display: none;
        }

        /* Main App */
        .app {
            display: none;
            min-height: 100vh;
        }

        .app.authenticated {
            display: block;
        }

        .app.authenticated ~ .lock-screen {
            display: none;
        }

        /* Header */
        .admin-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .admin-header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .admin-store-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .admin-header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .btn-logout {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.7rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background: var(--danger);
            border-color: var(--danger);
        }

        /* Navigation */
        .admin-nav {
            background: var(--bg-soft);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            position: sticky;
            top: 60px;
            z-index: 99;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--muted);
            padding: 1rem 1.5rem;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .nav-btn:hover {
            color: var(--text);
        }

        .nav-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        /* Content Area */
        .admin-content {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        /* Products Table */
        .table-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 12px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            background: var(--accent);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.8rem 1.8rem;
            border-radius: 12px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: var(--primary-soft);
            border-color: var(--primary);
        }

        .btn-danger {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        .btn-icon {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .btn-icon:hover {
            background: var(--primary-soft);
            border-color: var(--primary);
        }

        .table-wrapper {
            overflow-x: auto;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: right;
            padding: 1rem 1.5rem;
            background: var(--bg-soft);
            color: var(--muted);
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background: var(--primary-soft);
        }

        .product-thumb {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .stock-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .stock-badge.in-stock {
            background: rgba(74, 222, 128, 0.15);
            color: var(--success);
        }

        .stock-badge.low-stock {
            background: rgba(251, 191, 36, 0.15);
            color: var(--warning);
        }

        .stock-badge.out-of-stock {
            background: rgba(248, 113, 113, 0.15);
            color: var(--danger);
        }

        /* Settings */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
        }

        .settings-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
        }

        .settings-card h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 500;
        }

        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.8rem 1rem;
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .image-input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .image-input-group input {
            flex: 1;
        }

        .image-preview {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .add-image-btn {
            background: var(--primary-soft);
            border: 1px dashed var(--primary);
            color: var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 0.5rem;
        }

        .add-image-btn:hover {
            background: var(--primary);
            color: white;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            max-width: 700px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .modal-title {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .modal-close {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: var(--danger);
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
        }

        /* Loading & States */
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--muted);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--muted);
        }

        .empty-state h3 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            width: 90%;
            max-width: 500px;
        }

        .toast {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            animation: slideDown 0.3s ease;
            backdrop-filter: blur(16px);
        }

        .toast.success {
            border-left: 3px solid var(--success);
        }

        .toast.error {
            border-left: 3px solid var(--danger);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateY(-20px);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .admin-header {
                padding: 0.8rem 1rem;
            }
            
            .admin-store-name {
                font-size: 1.1rem;
            }
            
            .admin-nav {
                padding: 0 1rem;
                gap: 0.5rem;
            }
            
            .nav-btn {
                padding: 0.8rem 1rem;
                font-size: 0.85rem;
            }
            
            .admin-content {
                padding: 1rem;
            }
            
            .settings-grid {
                grid-template-columns: 1fr;
            }
            
            .table-header {
                flex-direction: column;
                align-items: stretch;
            }
            
            td, th {
                padding: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Lock Screen -->
    <div class="lock-screen" id="lockScreen">
        <div class="lock-card">
            <div class="lock-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0110 0v4"/>
                </svg>
            </div>
            <h2 class="lock-title">لوحة التحكم</h2>
            <p class="lock-subtitle" id="lockStoreName">المتجر</p>
            <input type="password" class="lock-input" id="passwordInput" placeholder="أدخل كلمة السر" autocomplete="off">
            <div class="lock-error" id="lockError">كلمة السر غير صحيحة</div>
            <button class="lock-btn" onclick="authenticate()">دخول</button>
        </div>
    </div>

    <!-- Main App -->
    <div class="app" id="app">
        <!-- Header -->
        <header class="admin-header">
            <div class="admin-header-left">
                <h1 class="admin-store-name" id="adminStoreName">المتجر</h1>
            </div>
            <div class="admin-header-right">
                <button class="btn-logout" onclick="logout()">تسجيل الخروج</button>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="admin-nav">
            <button class="nav-btn active" onclick="switchSection('products')">المنتجات</button>
            <button class="nav-btn" onclick="switchSection('settings')">إعدادات المتجر</button>
        </nav>

        <!-- Content -->
        <div class="admin-content">
            <!-- Products Section -->
            <div class="section active" id="productsSection">
                <div class="table-header">
                    <h2 class="section-title">المنتجات</h2>
                    <div style="display: flex; gap: 1rem;">
                        <button class="btn-secondary" onclick="exportProducts()" style="display: flex; align-items: center; gap: 0.5rem;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                            </svg>
                            تصدير JSON
                        </button>
                        <button class="btn-secondary" onclick="importProducts()" style="display: flex; align-items: center; gap: 0.5rem;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                            </svg>
                            استيراد JSON
                        </button>
                        <button class="btn-primary" onclick="openProductModal()">
                            + إضافة منتج
                        </button>
                    </div>
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>الصورة</th>
                                <th>اسم المنتج</th>
                                <th>السعر</th>
                                <th>المخزون</th>
                                <th>إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody">
                            <tr>
                                <td colspan="5" class="loading">جاري تحميل المنتجات...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="empty-state" id="emptyProducts" style="display: none;">
                    <h3>لا توجد منتجات</h3>
                    <p>أضف منتجك الأول للبدء</p>
                </div>
            </div>

            <!-- Settings Section -->
            <div class="section" id="settingsSection">
                <h2 class="section-title" style="margin-bottom: 2rem;">إعدادات المتجر</h2>
                <div class="settings-grid">
                    <div class="settings-card">
                        <h3>معلومات المتجر</h3>
                        <div class="form-group">
                            <label>اسم المتجر (عربي)</label>
                            <input type="text" id="settingsNameAR" placeholder="اسم المتجر بالعربية">
                        </div>
                        <div class="form-group">
                            <label>اسم المتجر (فرنسي)</label>
                            <input type="text" id="settingsNameFR" placeholder="اسم المتجر بالفرنسية">
                        </div>
                        <div class="form-group">
                            <label>وصف المتجر (عربي)</label>
                            <textarea id="settingsDescAR" placeholder="وصف المتجر بالعربية"></textarea>
                        </div>
                        <div class="form-group">
                            <label>وصف المتجر (فرنسي)</label>
                            <textarea id="settingsDescFR" placeholder="وصف المتجر بالفرنسية"></textarea>
                        </div>
                    </div>
                    <div class="settings-card">
                        <h3>معلومات الاتصال</h3>
                        <div class="form-group">
                            <label>رقم واتساب</label>
                            <input type="text" id="settingsWhatsApp" placeholder="212600000000">
                        </div>
                        <div class="form-group">
                            <label>رمز العملة</label>
                            <input type="text" id="settingsCurrency" placeholder="درهم">
                        </div>
                        <div class="form-group">
                            <label>اللغة</label>
                            <input type="text" id="settingsLang" placeholder="ar / fr / both" disabled style="opacity: 0.5;">
                            <small style="color: var(--muted); display: block; margin-top: 0.5rem;">يمكن تغييرها فقط من الإدارة الرئيسية</small>
                        </div>
                        <button class="btn-primary" onclick="saveSettings()" style="width: 100%; margin-top: 1rem;">
                            حفظ الإعدادات
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Product Modal -->
    <div class="modal-overlay" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="productModalTitle">إضافة منتج جديد</h3>
                <button class="modal-close" onclick="closeProductModal()">✕</button>
            </div>
            <form id="productForm" onsubmit="saveProduct(event)">
                <input type="hidden" id="productId">
                <div class="form-group">
                    <label>اسم المنتج (عربي) *</label>
                    <input type="text" id="productTitleAR" required placeholder="اسم المنتج بالعربية">
                </div>
                <div class="form-group">
                    <label>اسم المنتج (فرنسي)</label>
                    <input type="text" id="productTitleFR" placeholder="اسم المنتج بالفرنسية">
                </div>
                <div class="form-group">
                    <label>وصف المنتج (عربي)</label>
                    <textarea id="productDescAR" placeholder="وصف المنتج بالعربية"></textarea>
                </div>
                <div class="form-group">
                    <label>وصف المنتج (فرنسي)</label>
                    <textarea id="productDescFR" placeholder="وصف المنتج بالفرنسية"></textarea>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>السعر *</label>
                        <input type="number" id="productPrice" required placeholder="0.00" step="0.01" min="0">
                    </div>
                    <div class="form-group">
                        <label>المخزون</label>
                        <input type="number" id="productStock" placeholder="99" min="0" value="99">
                    </div>
                </div>
                <div class="form-group">
                    <label>الصور (حتى 5 روابط)</label>
                    <div id="imagesContainer">
                        <div class="image-input-group">
                            <input type="text" class="product-image-input" placeholder="رابط الصورة">
                            <img class="image-preview" src="" alt="" style="display: none;">
                        </div>
                    </div>
                    <button type="button" class="add-image-btn" onclick="addImageInput()">+ إضافة صورة</button>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeProductModal()">إلغاء</button>
                    <button type="submit" class="btn-primary">حفظ المنتج</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Hidden file input for import -->
    <input type="file" id="importFileInput" accept=".json" style="display: none;" onchange="handleImportFile(event)">

    <script>
        // Global State
        const slug = window.location.pathname.split('/')[2];
        let store = null;
        let products = [];
        let isAuthenticated = false;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            
            // Preview images on input change
            document.addEventListener('input', (e) => {
                if (e.target.classList.contains('product-image-input')) {
                    const preview = e.target.parentElement.querySelector('.image-preview');
                    if (e.target.value) {
                        preview.src = e.target.value;
                        preview.style.display = 'block';
                        preview.onerror = () => {
                            preview.style.display = 'none';
                        };
                    } else {
                        preview.style.display = 'none';
                    }
                }
            });

            // Enter key for lock screen
            document.getElementById('passwordInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    authenticate();
                }
            });
        });

        // Authentication
        function checkAuth() {
            const auth = sessionStorage.getItem(`store_auth_${slug}`);
            if (auth === '1') {
                isAuthenticated = true;
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('app').classList.add('authenticated');
                loadStore();
                loadProducts();
            }
        }

        async function authenticate() {
            const password = document.getElementById('passwordInput').value;
            const errorEl = document.getElementById('lockError');
            const inputEl = document.getElementById('passwordInput');

            if (!password) {
                showError(inputEl, errorEl);
                return;
            }

            try {
                const response = await fetch(`/api/stores/auth`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        slug: slug,
                        password: password
                    })
                });

                if (response.ok) {
                    isAuthenticated = true;
                    sessionStorage.setItem(`store_auth_${slug}`, '1');
                    document.getElementById('lockScreen').style.display = 'none';
                    document.getElementById('app').classList.add('authenticated');
                    await loadStore();
                    await loadProducts();
                } else {
                    showError(inputEl, errorEl);
                }
            } catch (error) {
                showError(inputEl, errorEl);
                console.error('Auth error:', error);
            }
        }

        function showError(inputEl, errorEl) {
            inputEl.classList.add('error');
            errorEl.style.display = 'block';
            setTimeout(() => {
                inputEl.classList.remove('error');
                errorEl.style.display = 'none';
            }, 2000);
        }

        function logout() {
            sessionStorage.removeItem(`store_auth_${slug}`);
            isAuthenticated = false;
            document.getElementById('lockScreen').style.display = 'flex';
            document.getElementById('app').classList.remove('authenticated');
            document.getElementById('passwordInput').value = '';
            store = null;
            products = [];
        }

        // Load Store
        async function loadStore() {
            try {
                const response = await fetch(`/api/stores?slug=${slug}`);
                if (!response.ok) throw new Error('Store not found');
                store = await response.json();
                
                document.getElementById('lockStoreName').textContent = store.name_ar;
                document.getElementById('adminStoreName').textContent = store.name_ar;
                
                // Load settings
                document.getElementById('settingsNameAR').value = store.name_ar || '';
                document.getElementById('settingsNameFR').value = store.name_fr || '';
                document.getElementById('settingsDescAR').value = store.desc_ar || '';
                document.getElementById('settingsDescFR').value = store.desc_fr || '';
                document.getElementById('settingsWhatsApp').value = store.whatsapp || '';
                document.getElementById('settingsCurrency').value = store.currency || '';
                document.getElementById('settingsLang').value = store.lang || 'ar';
            } catch (error) {
                console.error('Error loading store:', error);
                showToast('خطأ في تحميل بيانات المتجر', 'error');
            }
        }

        // Load Products
        async function loadProducts() {
            const tbody = document.getElementById('productsTableBody');
            const emptyState = document.getElementById('emptyProducts');
            
            tbody.innerHTML = '<tr><td colspan="5" class="loading">جاري تحميل المنتجات...</td></tr>';
            emptyState.style.display = 'none';

            try {
                const response = await fetch(`/api/products?slug=${slug}`);
                if (!response.ok) throw new Error('Failed to load products');
                products = await response.json();
                renderProductsTable();
            } catch (error) {
                console.error('Error loading products:', error);
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--danger);">خطأ في تحميل المنتجات</td></tr>';
            }
        }

        function renderProductsTable() {
            const tbody = document.getElementById('productsTableBody');
            const emptyState = document.getElementById('emptyProducts');

            if (products.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            tbody.innerHTML = products.map(product => {
                const image = product.images && product.images.length > 0 
                    ? product.images[0] 
                    : '';
                const stockStatus = product.stock > 10 ? 'in-stock' : product.stock > 0 ? 'low-stock' : 'out-of-stock';
                const stockText = product.stock > 10 ? 'متوفر' : product.stock > 0 ? `منخفض (${product.stock})` : 'نفذ';

                return `
                    <tr>
                        <td>
                            ${image 
                                ? `<img class="product-thumb" src="${image}" alt="" onerror="this.style.display='none'">` 
                                : '<div class="product-thumb" style="background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--muted);">لا توجد</div>'
                            }
                        </td>
                        <td><strong>${product.title_ar}</strong>${product.title_fr ? `<br><small style="color:var(--muted);">${product.title_fr}</small>` : ''}</td>
                        <td>${product.price.toFixed(2)} ${store.currency}</td>
                        <td><span class="stock-badge ${stockStatus}">${stockText}</span></td>
                        <td>
                            <div style="display: flex; gap: 0.5rem;">
                                <button class="btn-icon" onclick="editProduct('${product.id}')" title="تعديل">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                                        <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                    </svg>
                                </button>
                                <button class="btn-icon" onclick="deleteProduct('${product.id}')" title="حذف" style="border-color:var(--danger);color:var(--danger);">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                                    </svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // Product Modal
        function openProductModal(productId = null) {
            const modal = document.getElementById('productModal');
            const title = document.getElementById('productModalTitle');
            const form = document.getElementById('productForm');
            
            form.reset();
            document.getElementById('productId').value = '';
            document.getElementById('productStock').value = '99';
            
            // Reset images
            const imagesContainer = document.getElementById('imagesContainer');
            imagesContainer.innerHTML = `
                <div class="image-input-group">
                    <input type="text" class="product-image-input" placeholder="رابط الصورة">
                    <img class="image-preview" src="" alt="" style="display: none;">
                </div>
            `;

            if (productId) {
                title.textContent = 'تعديل المنتج';
                const product = products.find(p => p.id === productId);
                if (product) {
                    document.getElementById('productId').value = product.id;
                    document.getElementById('productTitleAR').value = product.title_ar || '';
                    document.getElementById('productTitleFR').value = product.title_fr || '';
                    document.getElementById('productDescAR').value = product.desc_ar || '';
                    document.getElementById('productDescFR').value = product.desc_fr || '';
                    document.getElementById('productPrice').value = product.price;
                    document.getElementById('productStock').value = product.stock;

                    if (product.images && product.images.length > 0) {
                        imagesContainer.innerHTML = product.images.map((img, index) => `
                            <div class="image-input-group">
                                <input type="text" class="product-image-input" placeholder="رابط الصورة ${index + 1}" value="${img}">
                                <img class="image-preview" src="${img}" alt="" style="display: block;" onerror="this.style.display='none'">
                            </div>
                        `).join('');
                    }
                }
            } else {
                title.textContent = 'إضافة منتج جديد';
            }

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeProductModal() {
            document.getElementById('productModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function addImageInput() {
            const container = document.getElementById('imagesContainer');
            const imageInputs = container.querySelectorAll('.image-input-group');
            
            if (imageInputs.length >= 5) {
                showToast('الحد الأقصى 5 صور', 'error');
                return;
            }

            const newInput = document.createElement('div');
            newInput.className = 'image-input-group';
            newInput.innerHTML = `
                <input type="text" class="product-image-input" placeholder="رابط الصورة ${imageInputs.length + 1}">
                <img class="image-preview" src="" alt="" style="display: none;">
            `;
            container.appendChild(newInput);
        }

        async function saveProduct(event) {
            event.preventDefault();

            const productId = document.getElementById('productId').value;
            const titleAR = document.getElementById('productTitleAR').value;
            const titleFR = document.getElementById('productTitleFR').value;
            const descAR = document.getElementById('productDescAR').value;
            const descFR = document.getElementById('productDescFR').value;
            const price = parseFloat(document.getElementById('productPrice').value);
            const stock = parseInt(document.getElementById('productStock').value);

            // Collect images
            const imageInputs = document.querySelectorAll('.product-image-input');
            const images = Array.from(imageInputs)
                .map(input => input.value.trim())
                .filter(url => url !== '');

            const productData = {
                title_ar: titleAR,
                title_fr: titleFR || null,
                desc_ar: descAR || null,
                desc_fr: descFR || null,
                price: price,
                stock: stock,
                images: images
            };

            try {
                let response;
                if (productId) {
                    // Update
                    response = await fetch(`/api/products?slug=${slug}&id=${productId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Store-Password': sessionStorage.getItem(`store_pass_${slug}`) || ''
                        },
                        body: JSON.stringify(productData)
                    });
                } else {
                    // Create
                    response = await fetch(`/api/products?slug=${slug}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Store-Password': document.getElementById('passwordInput').value || sessionStorage.getItem(`store_pass_${slug}`) || ''
                        },
                        body: JSON.stringify(productData)
                    });
                }

                if (response.ok) {
                    showToast(productId ? 'تم تحديث المنتج بنجاح' : 'تم إضافة المنتج بنجاح', 'success');
                    closeProductModal();
                    await loadProducts();
                } else {
                    const error = await response.json();
                    showToast(error.error || 'حدث خطأ', 'error');
                }
            } catch (error) {
                console.error('Error saving product:', error);
                showToast('حدث خطأ في حفظ المنتج', 'error');
            }
        }

        function editProduct(productId) {
            openProductModal(productId);
        }

        async function deleteProduct(productId) {
            if (!confirm('هل أنت متأكد من حذف هذا المنتج؟')) return;

            try {
                const response = await fetch(`/api/products?slug=${slug}&id=${productId}`, {
                    method: 'DELETE',
                    headers: {
                        'X-Store-Password': sessionStorage.getItem(`store_pass_${slug}`) || ''
                    }
                });

                if (response.ok) {
                    showToast('تم حذف المنتج بنجاح', 'success');
                    await loadProducts();
                } else {
                    showToast('حدث خطأ في حذف المنتج', 'error');
                }
            } catch (error) {
                console.error('Error deleting product:', error);
                showToast('حدث خطأ في حذف المنتج', 'error');
            }
        }

        // Settings
        async function saveSettings() {
            const updates = {
                name_ar: document.getElementById('settingsNameAR').value,
                name_fr: document.getElementById('settingsNameFR').value,
                desc_ar: document.getElementById('settingsDescAR').value,
                desc_fr: document.getElementById('settingsDescFR').value,
                whatsapp: document.getElementById('settingsWhatsApp').value,
                currency: document.getElementById('settingsCurrency').value
            };

            try {
                const response = await fetch(`/api/stores?slug=${slug}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Store-Password': sessionStorage.getItem(`store_pass_${slug}`) || ''
                    },
                    body: JSON.stringify(updates)
                });

                if (response.ok) {
                    showToast('تم حفظ الإعدادات بنجاح', 'success');
                    await loadStore();
                } else {
                    showToast('حدث خطأ في حفظ الإعدادات', 'error');
                }
            } catch (error) {
                console.error('Error saving settings:', error);
                showToast('حدث خطأ في حفظ الإعدادات', 'error');
            }
        }

        // Import/Export
        function exportProducts() {
            if (products.length === 0) {
                showToast('لا توجد منتجات للتصدير', 'error');
                return;
            }

            const exportData = products.map(p => ({
                title_ar: p.title_ar,
                title_fr: p.title_fr,
                desc_ar: p.desc_ar,
                desc_fr: p.desc_fr,
                price: p.price,
                stock: p.stock,
                images: p.images
            }));

            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `products-${slug}-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            showToast('تم تصدير المنتجات بنجاح', 'success');
        }

        function importProducts() {
            document.getElementById('importFileInput').click();
        }

        async function handleImportFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            try {
                const text = await file.text();
                const data = JSON.parse(text);

                if (!Array.isArray(data)) {
                    throw new Error('Invalid format');
                }

                let successCount = 0;
                for (const product of data) {
                    if (product.title_ar && product.price) {
                        try {
                            const response = await fetch(`/api/products?slug=${slug}`, {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'X-Store-Password': sessionStorage.getItem(`store_pass_${slug}`) || ''
                                },
                                body: JSON.stringify({
                                    title_ar: product.title_ar,
                                    title_fr: product.title_fr || null,
                                    desc_ar: product.desc_ar || null,
                                    desc_fr: product.desc_fr || null,
                                    price: parseFloat(product.price),
                                    stock: parseInt(product.stock) || 99,
                                    images: product.images || []
                                })
                            });
                            if (response.ok) successCount++;
                        } catch (err) {
                            console.error('Error importing product:', err);
                        }
                    }
                }

                showToast(`تم استيراد ${successCount} منتج بنجاح`, 'success');
                await loadProducts();
            } catch (error) {
                console.error('Import error:', error);
                showToast('خطأ في استيراد الملف. تأكد من صحة التنسيق.', 'error');
            }

            // Reset file input
            event.target.value = '';
        }

        // Navigation
        function switchSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

            document.getElementById(`${section}Section`).classList.add('active');
            event.target.classList.add('active');
        }

        // Toast Notifications
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span>${message}</span>
                <button onclick="this.parentElement.remove()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem;">✕</button>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s ease forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Modal overlay click
        document.getElementById('productModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('productModal')) {
                closeProductModal();
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeProductModal();
            }
        });
    </script>
</body>
</html>
