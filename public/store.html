<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title id="pageTitle">متجر — NJSERVICES</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&fhttps://jawadnajih27-spec.github.io/your-brand/#amily=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<style>
/* ══ RESET & DESIGN TOKENS ══ */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1623;--bg-soft:#161f2e;--surface:#1e2a3d;--surface-2:#243247;
  --border:rgba(99,102,241,0.18);--border-soft:rgba(255,255,255,0.06);
  --primary:#6366f1;--primary-s:rgba(99,102,241,0.12);--accent:#22d3ee;--accent-s:rgba(34,211,238,0.12);
  --text:#e2e8f0;--muted:#94a3b8;--success:#4ade80;--danger:#f87171;--warning:#fbbf24;
  --shadow:0 24px 60px rgba(0,0,0,0.45);--radius-xl:20px;--radius-lg:14px;--radius-md:10px;
}
html,body{height:100%;font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text)}
body{overflow-x:hidden}

/* ══ SCROLLBAR ══ */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--surface-2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--primary)}

/* ══ HEADER ══ */
.store-header{
  position:sticky;top:0;z-index:100;
  background:linear-gradient(180deg,rgba(15,22,35,.95),rgba(15,22,35,.8));
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border-soft);
}
.header-inner{
  max-width:1200px;margin:0 auto;padding:16px 24px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.store-logo{
  display:flex;align-items:center;gap:12px;
}
.store-logo-avatar{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  display:grid;place-items:center;font-weight:900;font-size:1.2rem;color:#fff;
  box-shadow:0 4px 15px rgba(99,102,241,.3);
}
.store-logo-text h1{font-size:1.1rem;font-weight:900;color:var(--text);line-height:1.2}
.store-logo-text p{font-size:.78rem;color:var(--muted);margin-top:2px}

.header-actions{display:flex;align-items:center;gap:10px}

/* ══ CART BUTTON ══ */
.cart-btn{
  position:relative;display:flex;align-items:center;gap:8px;
  padding:10px 16px;border-radius:var(--radius-md);
  background:var(--surface);border:1px solid var(--border-soft);
  color:var(--text);font-family:'Tajawal',sans-serif;font-size:.9rem;font-weight:700;
  cursor:pointer;transition:all .2s;
}
.cart-btn:hover{background:var(--surface-2);border-color:var(--border)}
.cart-count{
  position:absolute;top:-6px;left:-6px;
  width:20px;height:20px;border-radius:50%;
  background:var(--danger);color:#fff;font-size:.7rem;font-weight:800;
  display:grid;place-items:center;
}

/* ══ MAIN ══ */
.store-main{max-width:1200px;margin:0 auto;padding:24px}

/* ══ HERO ══ */
.store-hero{
  background:linear-gradient(160deg,rgba(30,42,61,.9),rgba(22,31,46,.95));
  border:1px solid var(--border-soft);border-radius:var(--radius-xl);
  padding:40px 32px;margin-bottom:28px;
  position:relative;overflow:hidden;
}
.store-hero::before{
  content:"";position:absolute;top:-40px;right:-40px;width:150px;height:150px;
  background:var(--primary-s);filter:blur(40px);border-radius:50%;
}
.store-hero h2{font-size:1.6rem;font-weight:900;margin-bottom:8px;position:relative}
.store-hero p{color:var(--muted);font-size:.95rem;position:relative}
.hero-meta{display:flex;gap:16px;margin-top:16px;flex-wrap:wrap;position:relative}
.hero-meta span{display:flex;align-items:center;gap:6px;font-size:.85rem;color:var(--muted)}
.hero-meta svg{width:16px;height:16px;stroke:var(--accent)}

/* ══ PRODUCTS GRID ══ */
.products-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
}
.product-card{
  background:linear-gradient(160deg,rgba(30,42,61,.9),rgba(22,31,46,.95));
  border:1px solid var(--border-soft);border-radius:var(--radius-xl);
  overflow:hidden;transition:transform .25s,border-color .25s;
  display:flex;flex-direction:column;
}
.product-card:hover{transform:translateY(-4px);border-color:rgba(99,102,241,.3)}
.product-img{
  width:100%;aspect-ratio:4/3;background:var(--surface-2);
  display:grid;place-items:center;position:relative;overflow:hidden;
}
.product-img img{width:100%;height:100%;object-fit:cover}
.product-img-placeholder{
  font-size:2.5rem;opacity:.3;
}
.product-badge{
  position:absolute;top:10px;right:10px;
  padding:4px 10px;border-radius:999px;font-size:.72rem;font-weight:700;
  background:rgba(0,0,0,.5);backdrop-filter:blur(10px);color:#fff;
}
.product-info{padding:16px;flex:1;display:flex;flex-direction:column}
.product-title{font-size:.95rem;font-weight:800;margin-bottom:6px;line-height:1.3}
.product-desc{font-size:.82rem;color:var(--muted);line-height:1.5;margin-bottom:12px;flex:1}
.product-footer{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:auto}
.product-price{font-size:1.15rem;font-weight:900;color:var(--accent)}
.product-price .old{font-size:.85rem;color:var(--muted);text-decoration:line-through;margin-left:6px}
.add-btn{
  padding:8px 14px;border-radius:var(--radius-md);border:none;
  background:linear-gradient(135deg,var(--primary),#4f46e5);color:#fff;
  font-family:'Tajawal',sans-serif;font-size:.82rem;font-weight:700;
  cursor:pointer;transition:transform .2s,box-shadow .2s;
  box-shadow:0 4px 12px rgba(99,102,241,.25);
}
.add-btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(99,102,241,.35)}
.add-btn:active{transform:scale(.95)}

/* ══ EMPTY STATE ══ */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state svg{width:64px;height:64px;stroke:var(--surface-2);margin-bottom:16px}
.empty-state h3{font-size:1.1rem;color:var(--text);margin-bottom:8px}

/* ══ CART SIDEBAR ══ */
.cart-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  z-index:200;display:none;opacity:0;transition:opacity .3s;
}
.cart-overlay.open{display:block;opacity:1}
.cart-sidebar{
  position:fixed;top:0;left:0;height:100%;width:min(400px,90vw);
  background:var(--surface);border-right:1px solid var(--border);
  z-index:201;transform:translateX(-100%);transition:transform .3s ease;
  display:flex;flex-direction:column;
}
.cart-sidebar.open{transform:translateX(0)}
.cart-hd{
  padding:20px 24px;border-bottom:1px solid var(--border-soft);
  display:flex;align-items:center;justify-content:space-between;
}
.cart-hd h3{font-size:1rem;font-weight:800}
.cart-close{
  background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;
  width:32px;height:32px;border-radius:8px;transition:background .2s;
  display:grid;place-items:center;
}
.cart-close:hover{background:rgba(255,255,255,.06)}
.cart-body{flex:1;overflow-y:auto;padding:16px}
.cart-item{
  display:flex;gap:12px;padding:12px;background:rgba(0,0,0,.2);border-radius:var(--radius-md);margin-bottom:10px;
}
.cart-item-img{width:56px;height:56px;border-radius:8px;background:var(--surface-2);object-fit:cover;flex-shrink:0}
.cart-item-info{flex:1}
.cart-item-title{font-size:.85rem;font-weight:700;margin-bottom:4px}
.cart-item-price{font-size:.82rem;color:var(--accent);font-weight:800}
.cart-item-qty{display:flex;align-items:center;gap:8px;margin-top:6px}
.qty-btn{
  width:24px;height:24px;border-radius:6px;border:none;background:rgba(255,255,255,.08);
  color:var(--text);font-size:.9rem;cursor:pointer;display:grid;place-items:center;
}
.qty-btn:hover{background:rgba(255,255,255,.14)}
.cart-item-remove{
  background:none;border:none;color:var(--danger);font-size:.8rem;cursor:pointer;padding:4px;
  align-self:flex-start;
}
.cart-foot{
  padding:16px 24px;border-top:1px solid var(--border-soft);
  background:rgba(0,0,0,.2);
}
.cart-total{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cart-total-label{font-size:.9rem;color:var(--muted)}
.cart-total-val{font-size:1.3rem;font-weight:900;color:var(--accent)}
.checkout-btn{
  width:100%;padding:14px;border-radius:var(--radius-md);border:none;
  background:linear-gradient(135deg,var(--success),#16a34a);color:#0f172a;
  font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:800;
  cursor:pointer;transition:transform .2s,box-shadow .2s;
  box-shadow:0 8px 20px rgba(74,222,128,.2);
}
.checkout-btn:hover{transform:translateY(-2px)}
.checkout-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ══ WHATSAPP FLOAT ══ */
.whatsapp-float{
  position:fixed;bottom:24px;left:24px;z-index:50;
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,#25d366,#128c7e);
  display:grid;place-items:center;box-shadow:0 8px 24px rgba(37,211,102,.3);
  cursor:pointer;transition:transform .2s,box-shadow .2s;border:none;
}
.whatsapp-float:hover{transform:scale(1.08);box-shadow:0 12px 32px rgba(37,211,102,.4)}
.whatsapp-float svg{width:28px;height:28px;fill:#fff}

/* ══ FOOTER ══ */
.store-footer{
  text-align:center;padding:24px;color:var(--muted);font-size:.8rem;
  border-top:1px solid var(--border-soft);margin-top:40px;
}

/* ══ LOADING ══ */
.skeleton{
  background:linear-gradient(90deg,var(--surface-2) 25%,var(--surface) 50%,var(--surface-2) 75%);
  background-size:200% 100%;animation:skeleton 1.5s infinite;border-radius:8px;
}
@keyframes skeleton{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ══ TOAST ══ */
.toast{
  position:fixed;bottom:24px;right:50%;transform:translateX(50%) translateY(100px);
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:12px 20px;font-size:.88rem;font-weight:700;z-index:9999;
  box-shadow:0 12px 40px rgba(0,0,0,.5);display:flex;align-items:center;gap:8px;
  transition:transform .3s ease,opacity .3s;
  opacity:0;
}
.toast.show{transform:translateX(50%) translateY(0);opacity:1}
.toast.success{border-color:rgba(74,222,128,.35);color:var(--success)}

/* ══ RESPONSIVE ══ */
@media(max-width:640px){
  .store-main{padding:16px}
  .store-hero{padding:28px 20px}
  .store-hero h2{font-size:1.3rem}
  .products-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
}
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header class="store-header">
  <div class="header-inner">
    <div class="store-logo">
      <div class="store-logo-avatar" id="storeAvatar">م</div>
      <div class="store-logo-text">
        <h1 id="storeName">جاري التحميل...</h1>
        <p id="storeDesc">جاري تحميل بيانات المتجر</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="cart-btn" onclick="toggleCart()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/><circle cx="9" cy="20" r="1"/><circle cx="15" cy="20" r="1"/>
        </svg>
        <span>السلة</span>
        <span class="cart-count" id="cartCount" style="display:none">0</span>
      </button>

  </div>
</header>

<!-- ══ MAIN ══ -->
<main class="store-main">
  <div class="store-hero">
    <h2 id="heroTitle">أهلاً بك في متجرنا 👋</h2>
    <p id="heroDesc">اكتشف منتجاتنا المختارة بعناية</p>
    <div class="hero-meta" id="heroMeta">
      <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> متجر موثوق</span>
      <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> جودة مضمونة</span>

  <div id="productsContainer">
    <div class="products-grid" id="productsGrid"></div>

</main>

<!-- ══ CART SIDEBAR ══ -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-hd">
    <h3>🛒 سلّة المشتريات</h3>
    <button class="cart-close" onclick="toggleCart()">✕</button>

    <div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
      <h3>السلة فارغة</h3>
      <p style="font-size:.85rem;margin-top:4px">أضف منتجات من المتجر</p>

  <div class="cart-foot" id="cartFoot" style="display:none">
    <div class="cart-total">
      <span class="cart-total-label">الإجمالي:</span>
      <span class="cart-total-val" id="cartTotal">0 درهم</span>
    </div>
    <button class="checkout-btn" id="checkoutBtn" onclick="checkout()">
      إتمام الطلب عبر واتساب
    </button>
  </div>
</div>

<!-- ══ WHATSAPP FLOAT ══ -->
<a class="whatsapp-float" id="whatsappBtn" href="#" target="_blank" title="تواصل عبر واتساب">
  <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.892-11.893a11.901 11.901 0 00-3.476-8.413z"/></svg>
</a>

<!-- ══ FOOTER ══ -->
<footer class="store-footer">
  <span id="footerText">متجر رقمي — NJSERVICES © 2026</span>
</footer>

<!-- ══ TOAST ══ -->
<div class="toast" id="toast"><span id="toastMsg">تمت الإضافة للسلة</span></div>

<script>
'use strict';

/* ══ CONFIG ══ */
const API_BASE = '/api';
const urlParams = new URLSearchParams(window.location.search);
const STORE_SLUG = urlParams.get('slug') || location.pathname.split('/').filter(Boolean).pop() || 'demo';

let storeData = null;
let products = [];
let cart = JSON.parse(localStorage.getItem('cart_' + STORE_SLUG) || '[]');

/* ══ INIT ══ */
document.addEventListener('DOMContentLoaded', () => {
  loadStore();
  updateCartUI();
});

/* ══ LOAD STORE ══ */
async function loadStore() {
  try {
    const res = await fetch(`${API_BASE}/stores?slug=${encodeURIComponent(STORE_SLUG)}`);
    if (!res.ok) throw new Error('Store not found');
    storeData = await res.json();
    
    // Update page
    document.getElementById('pageTitle').textContent = (storeData.name_ar || storeData.slug) + ' — NJSERVICES';
    document.getElementById('storeName').textContent = storeData.name_ar || storeData.slug;
    document.getElementById('storeDesc').textContent = storeData.desc_ar || 'متجر إلكتروني';
    document.getElementById('storeAvatar').textContent = (storeData.name_ar || storeData.slug).charAt(0);
    document.getElementById('heroTitle').textContent = 'أهلاً بك في ' + (storeData.name_ar || storeData.slug) + ' 👋';
    document.getElementById('heroDesc').textContent = storeData.desc_ar || 'اكتشف منتجاتنا المختارة بعناية';
    document.getElementById('footerText').textContent = (storeData.name_ar || storeData.slug) + ' — NJSERVICES © 2026';
    
    // WhatsApp
    if (storeData.whatsapp) {
      document.getElementById('whatsappBtn').href = `https://wa.me/${storeData.whatsapp.replace(/\\D/g,'')}`;
    }
    
    // Load products
    loadProducts();
  } catch (err) {
    document.getElementById('storeName').textContent = 'المتجر غير موجود';
    document.getElementById('productsGrid').innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <h3>المتجر غير موجود أو غير نشط</h3>
        <p style="font-size:.85rem;margin-top:4px">تأكد من صحة الرابط</p>
      </div>`;
  }
}

/* ══ LOAD PRODUCTS ══ */
async function loadProducts() {
  const grid = document.getElementById('productsGrid');
  grid.innerHTML = Array(6).fill(`<div class="product-card"><div class="product-img"><div class="skeleton" style="width:100%;height:100%"></div></div><div class="product-info"><div class="skeleton" style="height:20px;width:80%;margin-bottom:8px"></div><div class="skeleton" style="height:14px;width:60%"></div></div></div>`).join('');
  
  try {
    const res = await fetch(`${API_BASE}/products?slug=${encodeURIComponent(STORE_SLUG)}`);
    if (!res.ok) throw new Error('No products');
    products = await res.json();
    
    if (!products.length) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
          <h3>لا توجد منتجات حالياً</h3>
          <p style="font-size:.85rem;margin-top:4px">سيتم إضافة منتجات قريباً</p>
        </div>`;
      return;
    }
    
    grid.innerHTML = products.map((p, i) => `
      <div class="product-card" data-id="${p.id}">
        <div class="product-img">
          ${p.images && p.images[0] ? `<img src="${esc(p.images[0])}" alt="${esc(p.title_ar || '')}" loading="lazy" onerror="this.style.display='none';this.parentElement.innerHTML='<div class=\\'product-img-placeholder\\'>📦</div>'">` : '<div class="product-img-placeholder">📦</div>'}
          ${p.stock !== undefined && p.stock <= 5 ? `<span class="product-badge">${p.stock === 0 ? 'نفذت الكمية' : 'الكمية محدودة'}</span>` : ''}
        </div>
        <div class="product-info">
          <div class="product-title">${esc(p.title_ar || 'منتج')}</div>
          <div class="product-desc">${esc(p.desc_ar || '').substring(0, 80)}${p.desc_ar && p.desc_ar.length > 80 ? '...' : ''}</div>
          <div class="product-footer">
            <div class="product-price">${p.price || 0} <span style="font-size:.8rem;font-weight:400;color:var(--muted)">${storeData.currency || 'درهم'}</span></div>
            <button class="add-btn" onclick="addToCart('${p.id}', ${p.price || 0}, '${esc(p.title_ar || '').replace(/'/g, "\\'")}')" ${p.stock === 0 ? 'disabled style="opacity:.5"' : ''}>
              ${p.stock === 0 ? 'نفذت' : '+ سلة'}
            </button>
          </div>
        </div>
      </div>
    `).join('');
  } catch (err) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><h3>خطأ في تحميل المنتجات</h3><p>${esc(err.message)}</p></div>`;
  }
}

/* ══ CART ══ */
function addToCart(id, price, title) {
  const existing = cart.find(item => item.id === id);
  if (existing) {
    existing.qty++;
  } else {
    cart.push({ id, price, title, qty: 1 });
  }
  saveCart();
  updateCartUI();
  showToast('✓ تمت الإضافة للسلة');
}

function removeFromCart(id) {
  cart = cart.filter(item => item.id !== id);
  saveCart();
  updateCartUI();
}

function changeQty(id, delta) {
  const item = cart.find(item => item.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) removeFromCart(id);
  else { saveCart(); updateCartUI(); }
}

function saveCart() {
  localStorage.setItem('cart_' + STORE_SLUG, JSON.stringify(cart));
}

function updateCartUI() {
  const count = cart.reduce((s, i) => s + i.qty, 0);
  const countEl = document.getElementById('cartCount');
  countEl.textContent = count;
  countEl.style.display = count > 0 ? 'flex' : 'none';
  
  const body = document.getElementById('cartBody');
  const foot = document.getElementById('cartFoot');
  
  if (!cart.length) {
    body.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
        <h3>السلة فارغة</h3>
        <p style="font-size:.85rem;margin-top:4px">أضف منتجات من المتجر</p>
      </div>`;
    foot.style.display = 'none';
    return;
  }
  
  body.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div style="width:44px;height:44px;border-radius:8px;background:var(--surface-2);display:grid;place-items:center;font-size:1.2rem">📦</div>
      <div class="cart-item-info">
        <div class="cart-item-title">${esc(item.title)}</div>
        <div class="cart-item-price">${item.price} ${storeData?.currency || 'درهم'}</div>
        <div class="cart-item-qty">
          <button class="qty-btn" onclick="changeQty('${item.id}', -1)">−</button>
          <span style="font-size:.85rem;font-weight:700;min-width:20px;text-align:center">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty('${item.id}', 1)">+</button>
        </div>
      </div>
      <button class="cart-item-remove" onclick="removeFromCart('${item.id}')" title="حذف">🗑</button>
    </div>
  `).join('');
  
  const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
  document.getElementById('cartTotal').textContent = total + ' ' + (storeData?.currency || 'درهم');
  foot.style.display = 'block';
}

function toggleCart() {
  document.getElementById('cartOverlay').classList.toggle('open');
  document.getElementById('cartSidebar').classList.toggle('open');
}

/* ══ CHECKOUT ══ */
function checkout() {
  if (!cart.length || !storeData?.whatsapp) {
    showToast('⚠️ أضف منتجات أولاً', 'warning');
    return;
  }
  
  const lines = cart.map((item, i) => `${i+1}. ${item.title} — ${item.qty}x (${item.price} ${storeData.currency || 'درهم'})`);
  const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
  const msg = `مرحباً، أرغب في طلب:\n\n${lines.join('\\n')}\n\nالإجمالي: ${total} ${storeData.currency || 'درهم'}`;
  
  const waUrl = `https://wa.me/${storeData.whatsapp.replace(/\\D/g,'')}?text=${encodeURIComponent(msg)}`;
  window.open(waUrl, '_blank');
}

/* ══ UTILS ══ */
function esc(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function showToast(msg, type='success') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast ' + type + ' show';
  setTimeout(() => toast.classList.remove('show'), 2500);
}
</script>
