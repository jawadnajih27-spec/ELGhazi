<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر | NJSERVICES</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f1623;
            --bg-soft: #161f2e;
            --surface: #1e2a3d;
            --surface-2: #243247;
            --border: rgba(99, 102, 241, 0.18);
            --primary: #6366f1;
            --primary-soft: rgba(99, 102, 241, 0.12);
            --accent: #22d3ee;
            --accent-soft: rgba(34, 211, 238, 0.12);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --success: #4ade80;
            --danger: #f87171;
            --warning: #fbbf24;
            --shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
            --primary-color: #6366f1;
            --accent-color: #22d3ee;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(15, 22, 35, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .store-logo {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid var(--primary-color);
        }

        .store-name-header {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 300px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .search-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.6rem 1rem;
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            font-size: 0.9rem;
            width: 250px;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .lang-toggle {
            background: var(--primary-soft);
            border: 1px solid var(--border);
            color: var(--primary-color);
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
            display: none;
        }

        .lang-toggle:hover {
            background: var(--primary-color);
            color: white;
        }

        .cart-btn {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            width: 48px;
            height: 48px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .cart-btn:hover {
            background: var(--primary-soft);
            border-color: var(--primary-color);
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--accent-color);
            color: #0f1623;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
        }

        /* Hero Section */
        .hero {
            margin-top: 80px;
            padding: 4rem 2rem;
            text-align: center;
            background: linear-gradient(135deg, var(--primary-soft), var(--accent-soft));
            border-bottom: 1px solid var(--border);
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .hero-desc {
            font-size: 1.2rem;
            color: var(--muted);
            max-width: 600px;
            margin: 0 auto 2rem;
            line-height: 1.6;
        }

        .hero-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 12px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .hero-btn:hover {
            background: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        /* Products Grid */
        .products-section {
            padding: 3rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--text);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }

        .product-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow);
            border-color: var(--primary-color);
        }

        .product-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .product-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-add-cart {
            flex: 1;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 12px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-add-cart:hover {
            background: var(--accent-color);
        }

        .btn-quick-view {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.8rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-quick-view:hover {
            background: var(--primary-soft);
            border-color: var(--primary-color);
        }

        .no-products {
            text-align: center;
            padding: 3rem;
            color: var(--muted);
            font-size: 1.2rem;
        }

        /* Product Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: var(--danger);
        }

        .gallery-main {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
        }

        .gallery-thumbnails {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            overflow-x: auto;
        }

        .gallery-thumb {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .gallery-thumb.active,
        .gallery-thumb:hover {
            border-color: var(--primary-color);
        }

        .modal-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--text);
        }

        .modal-desc {
            color: var(--muted);
            line-height: 1.8;
            margin-bottom: 1.5rem;
        }

        .modal-price {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
        }

        .btn-whatsapp {
            background: #25D366;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-whatsapp:hover {
            background: #128C7E;
        }

        /* Cart Sidebar */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: var(--surface);
            border-left: 1px solid var(--border);
            z-index: 3000;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .cart-sidebar.active {
            right: 0;
        }

        .cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2999;
            display: none;
        }

        .cart-overlay.active {
            display: block;
        }

        .cart-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .cart-title {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .cart-close {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .cart-close:hover {
            background: var(--danger);
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            background: var(--surface-2);
            border-radius: 12px;
            padding: 1rem;
        }

        .cart-item-image {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 8px;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .cart-item-price {
            color: var(--primary-color);
            font-weight: 700;
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .qty-btn {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .qty-btn:hover {
            background: var(--primary-soft);
        }

        .qty-input {
            width: 40px;
            text-align: center;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 0.3rem;
            font-family: 'Tajawal', sans-serif;
        }

        .cart-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .btn-checkout {
            width: 100%;
            background: #25D366;
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-checkout:hover {
            background: #128C7E;
        }

        /* Footer */
        .footer {
            padding: 2rem;
            text-align: center;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }

        .footer-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .footer-powered {
            color: var(--muted);
            font-size: 0.85rem;
        }

        /* Empty Cart */
        .empty-cart {
            text-align: center;
            padding: 3rem;
            color: var(--muted);
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--muted);
            font-size: 1.2rem;
        }

        /* Error State */
        .error-state {
            text-align: center;
            padding: 3rem;
            color: var(--danger);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 0.8rem 1rem;
            }
            
            .search-box {
                width: 150px;
                font-size: 0.8rem;
            }
            
            .store-name-header {
                font-size: 1.2rem;
                max-width: 150px;
            }
            
            .hero {
                padding: 2rem 1rem;
            }
            
            .hero-title {
                font-size: 2.2rem;
            }
            
            .products-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            
            .product-image {
                height: 250px;
            }
            
            .cart-sidebar {
                width: 100%;
                right: -100%;
            }
            
            .modal-content {
                padding: 1rem;
            }
            
            .gallery-main {
                height: 250px;
            }
            
            .modal-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <img class="store-logo" id="storeLogo" src="" alt="Logo" style="display: none;">
            <div class="store-name-header" id="storeNameHeader">متجر</div>
        </div>
        <div class="header-right">
            <input type="text" class="search-box" id="searchBox" placeholder="🔍 بحث في المنتجات...">
            <button class="lang-toggle" id="langToggle" onclick="toggleLanguage()">FR</button>
            <button class="cart-btn" onclick="toggleCart()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0"/>
                </svg>
                <span class="cart-badge" id="cartBadge" style="display: none;">0</span>
            </button>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h1 class="hero-title" id="heroTitle">متجرنا</h1>
        <p class="hero-desc" id="heroDesc">أفضل المنتجات بجودة عالية وأسعار مناسبة</p>
        <button class="hero-btn" onclick="scrollToProducts()">تصفح المنتجات</button>
    </section>

    <!-- Products Section -->
    <section class="products-section" id="productsSection">
        <h2 class="section-title" id="sectionTitle">المنتجات</h2>
        <div class="products-grid" id="productsGrid"></div>
        <div class="loading" id="loadingState" style="display: none;">جاري تحميل المنتجات...</div>
        <div class="no-products" id="noProducts" style="display: none;">لا توجد منتجات حالياً</div>
        <div class="error-state" id="errorState" style="display: none;">حدث خطأ في تحميل المنتجات</div>
    </section>

    <!-- Product Modal -->
    <div class="modal-overlay" id="productModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeProductModal()">✕</button>
            <img class="gallery-main" id="galleryMain" src="" alt="">
            <div class="gallery-thumbnails" id="galleryThumbnails"></div>
            <h2 class="modal-title" id="modalTitle"></h2>
            <p class="modal-desc" id="modalDesc"></p>
            <div class="modal-price" id="modalPrice"></div>
            <div class="modal-actions">
                <button class="btn-add-cart" onclick="addToCartFromModal()">أضف للسلة</button>
                <button class="btn-whatsapp" onclick="orderDirectWhatsApp()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.414z"/>
                    </svg>
                    طلب مباشر عبر واتساب
                </button>
            </div>
        </div>
    </div>

    <!-- Cart Overlay -->
    <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>

    <!-- Cart Sidebar -->
    <aside class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3 class="cart-title">سلة التسوق</h3>
            <button class="cart-close" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items" id="cartItems">
            <div class="empty-cart">السلة فارغة</div>
        </div>
        <div class="cart-footer" id="cartFooter" style="display: none;">
            <div class="cart-total">
                <span>الإجمالي:</span>
                <span id="cartTotal">0</span>
            </div>
            <button class="btn-checkout" onclick="checkoutWhatsApp()">إتمام الطلب عبر واتساب</button>
        </div>
    </aside>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-brand" id="footerBrand">متجرنا</div>
        <div class="footer-powered">Powered by NJSERVICES</div>
    </footer>

    <script>
        // Global State
        const slug = window.location.pathname.split('/')[2] || 'demo-store';
        let store = null;
        let products = [];
        let filteredProducts = [];
        let cart = [];
        let currentLang = 'ar'; // سيتم تحديدها من store.lang
        let modalProduct = null;
        let currentGalleryIndex = 0;

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            await loadStore();
            await loadProducts();
            
            document.getElementById('searchBox').addEventListener('input', (e) => {
                filterProducts(e.target.value);
            });

            // Load cart from localStorage
            const savedCart = localStorage.getItem(`cart_${slug}`);
            if (savedCart) {
                cart = JSON.parse(savedCart);
                updateCartUI();
            }
        });

        // Load Store Data
        async function loadStore() {
            try {
                const response = await fetch(`/api/stores?slug=${slug}`);
                if (!response.ok) throw new Error('Store not found');
                store = await response.json();

                if (!store.active) {
                    document.body.innerHTML = '<div style="text-align:center;padding:5rem;color:var(--text);"><h1>المتجر غير نشط حالياً</h1></div>';
                    return;
                }

                // Apply store settings
                currentLang = store.lang === 'both' ? 'ar' : store.lang;
                
                // Update colors
                document.documentElement.style.setProperty('--primary-color', store.primary_color || '#6366f1');
                document.documentElement.style.setProperty('--accent-color', store.accent_color || '#22d3ee');

                // Update UI
                updateStoreUI();
                
                // Show language toggle if both languages
                if (store.lang === 'both') {
                    document.getElementById('langToggle').style.display = 'block';
                }

                // Update document direction and lang attribute
                if (currentLang === 'fr') {
                    document.documentElement.dir = 'ltr';
                    document.documentElement.lang = 'fr';
                    document.getElementById('langToggle').textContent = 'AR';
                } else {
                    document.documentElement.dir = 'rtl';
                    document.documentElement.lang = 'ar';
                    document.getElementById('langToggle').textContent = 'FR';
                }

            } catch (error) {
                console.error('Error loading store:', error);
                document.body.innerHTML = '<div class="error-state" style="text-align:center;padding:5rem;"><h1>عذراً، المتجر غير موجود</h1></div>';
            }
        }

        function updateStoreUI() {
            const name = currentLang === 'fr' && store.name_fr ? store.name_fr : store.name_ar;
            
            document.getElementById('storeNameHeader').textContent = name;
            document.getElementById('heroTitle').textContent = name;
            document.getElementById('heroDesc').textContent = currentLang === 'fr' && store.desc_fr 
                ? store.desc_fr 
                : store.desc_ar || (currentLang === 'fr' ? 'Les meilleurs produits de qualité' : 'أفضل المنتجات بجودة عالية وأسعار مناسبة');
            document.getElementById('footerBrand').textContent = name;
            document.getElementById('sectionTitle').textContent = currentLang === 'fr' ? 'Produits' : 'المنتجات';
            document.title = name + ' | NJSERVICES';

            if (store.logo_url) {
                const logo = document.getElementById('storeLogo');
                logo.src = store.logo_url;
                logo.style.display = 'block';
            }
        }

        // Load Products
        async function loadProducts() {
            document.getElementById('loadingState').style.display = 'block';
            document.getElementById('productsGrid').innerHTML = '';
            document.getElementById('noProducts').style.display = 'none';
            document.getElementById('errorState').style.display = 'none';

            try {
                const response = await fetch(`/api/products?slug=${slug}`);
                if (!response.ok) throw new Error('Failed to load products');
                products = await response.json();
                filteredProducts = [...products];
                renderProducts();
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('errorState').style.display = 'block';
            } finally {
                document.getElementById('loadingState').style.display = 'none';
            }
        }

        function filterProducts(query) {
            if (!query.trim()) {
                filteredProducts = [...products];
            } else {
                const q = query.toLowerCase().trim();
                filteredProducts = products.filter(p => {
                    const titleAR = p.title_ar?.toLowerCase() || '';
                    const titleFR = p.title_fr?.toLowerCase() || '';
                    return titleAR.includes(q) || titleFR.includes(q);
                });
            }
            renderProducts();
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const noProducts = document.getElementById('noProducts');

            if (filteredProducts.length === 0) {
                grid.innerHTML = '';
                noProducts.style.display = 'block';
                noProducts.textContent = currentLang === 'fr' ? 'Aucun produit trouvé' : 'لا توجد منتجات';
                return;
            }

            noProducts.style.display = 'none';
            
            grid.innerHTML = filteredProducts.map(product => {
                const title = getProductTitle(product);
                const image = product.images && product.images.length > 0 
                    ? product.images[0] 
                    : 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAwIiBoZWlnaHQ9IjQwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMWUyYTNkIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZpbGw9IiM5NGEzYjgiIGZvbnQtZmFtaWx5PSJUYWphd2FsIiBmb250LXNpemU9IjIwIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkeT0iLjNlbSI+Tm8gSW1hZ2U8L3RleHQ+PC9zdmc+';

                return `
                    <div class="product-card" onclick="openProductModal('${product.id}')">
                        <img class="product-image" src="${image}" alt="${title}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAwIiBoZWlnaHQ9IjQwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMWUyYTNkIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZpbGw9IiM5NGEzYjgiIGZvbnQtZmFtaWx5PSJUYWphd2FsIiBmb250LXNpemU9IjIwIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkeT0iLjNlbSI+Tm8gSW1hZ2U8L3RleHQ+PC9zdmc+';">
                        <div class="product-info">
                            <div class="product-title">${title}</div>
                            <div class="product-price">${product.price.toFixed(2)} ${store.currency}</div>
                            <div class="product-actions">
                                <button class="btn-add-cart" onclick="event.stopPropagation(); addToCart('${product.id}')">
                                    ${currentLang === 'fr' ? 'Ajouter' : 'أضف للسلة'}
                                </button>
                                <button class="btn-quick-view" onclick="event.stopPropagation(); openProductModal('${product.id}')">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                        <circle cx="12" cy="12" r="3"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getProductTitle(product) {
            return currentLang === 'fr' && product.title_fr 
                ? product.title_fr 
                : product.title_ar;
        }

        function getProductDesc(product) {
            return currentLang === 'fr' && product.desc_fr 
                ? product.desc_fr 
                : product.desc_ar || '';
        }

        // Product Modal
        function openProductModal(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            modalProduct = product;
            currentGalleryIndex = 0;

            document.getElementById('modalTitle').textContent = getProductTitle(product);
            document.getElementById('modalDesc').textContent = getProductDesc(product);
            document.getElementById('modalPrice').textContent = `${product.price.toFixed(2)} ${store.currency}`;

            renderImageGallery(product.images);
            document.getElementById('productModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeProductModal() {
            document.getElementById('productModal').classList.remove('active');
            document.body.style.overflow = '';
            modalProduct = null;
        }

        function renderImageGallery(images) {
            const mainImg = document.getElementById('galleryMain');
            const thumbnails = document.getElementById('galleryThumbnails');

            if (!images || images.length === 0) {
                mainImg.src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAwIiBoZWlnaHQ9IjQwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMWUyYTNkIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZpbGw9IiM5NGEzYjgiIGZvbnQtZmFtaWx5PSJUYWphd2FsIiBmb250LXNpemU9IjIwIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkeT0iLjNlbSI+Tm8gSW1hZ2U8L3RleHQ+PC9zdmc+';
                thumbnails.innerHTML = '';
                return;
            }

            mainImg.src = images[currentGalleryIndex];
            mainImg.onerror = () => {
                mainImg.src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAwIiBoZWlnaHQ9IjQwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMWUyYTNkIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZpbGw9IiM5NGEzYjgiIGZvbnQtZmFtaWx5PSJUYWphd2FsIiBmb250LXNpemU9IjIwIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkeT0iLjNlbSI+Tm8gSW1hZ2U8L3RleHQ+PC9zdmc+';
            };

            thumbnails.innerHTML = images.map((img, index) => `
                <img 
                    class="gallery-thumb ${index === currentGalleryIndex ? 'active' : ''}" 
                    src="${img}" 
                    alt="Thumbnail ${index + 1}" 
                    onclick="changeGalleryImage(${index})"
                    onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iODAiIGhlaWdodD0iODAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iIzFlMmEzZCIvPjwvc3ZnPg=='"
                >
            `).join('');
        }

        function changeGalleryImage(index) {
            currentGalleryIndex = index;
            if (modalProduct) {
                renderImageGallery(modalProduct.images);
            }
        }

        // Cart Management
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            const existingItem = cart.find(item => item.id === productId);
            if (existingItem) {
                existingItem.qty += 1;
            } else {
                cart.push({
                    id: product.id,
                    title_ar: product.title_ar,
                    title_fr: product.title_fr,
                    price: product.price,
                    qty: 1,
                    images: product.images || []
                });
            }

            saveCart();
            updateCartUI();
            showAddToCartFeedback();
        }

        function addToCartFromModal() {
            if (modalProduct) {
                addToCart(modalProduct.id);
                closeProductModal();
            }
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            saveCart();
            updateCartUI();
        }

        function updateCartItemQty(productId, qty) {
            const item = cart.find(item => item.id === productId);
            if (item) {
                item.qty = Math.max(1, parseInt(qty) || 1);
                saveCart();
                updateCartUI();
            }
        }

        function saveCart() {
            localStorage.setItem(`cart_${slug}`, JSON.stringify(cart));
        }

        function updateCartUI() {
            const cartItems = document.getElementById('cartItems');
            const cartFooter = document.getElementById('cartFooter');
            const cartBadge = document.getElementById('cartBadge');
            const cartTotal = document.getElementById('cartTotal');

            const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

            // Update badge
            if (totalItems > 0) {
                cartBadge.style.display = 'flex';
                cartBadge.textContent = totalItems;
            } else {
                cartBadge.style.display = 'none';
            }

            // Update cart items
            if (cart.length === 0) {
                cartItems.innerHTML = '<div class="empty-cart">السلة فارغة</div>';
                cartFooter.style.display = 'none';
            } else {
                cartItems.innerHTML = cart.map(item => {
                    const title = currentLang === 'fr' && item.title_fr ? item.title_fr : item.title_ar;
                    const image = item.images && item.images.length > 0 ? item.images[0] : 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNzAiIGhlaWdodD0iNzAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iIzFlMmEzZCIvPjwvc3ZnPg==';
                    
                    return `
                        <div class="cart-item">
                            <img class="cart-item-image" src="${image}" alt="${title}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNzAiIGhlaWdodD0iNzAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iIzFlMmEzZCIvPjwvc3ZnPg=='">
                            <div class="cart-item-info">
                                <div class="cart-item-title">${title}</div>
                                <div class="cart-item-price">${(item.price * item.qty).toFixed(2)} ${store.currency}</div>
                                <div class="cart-item-controls">
                                    <button class="qty-btn" onclick="updateCartItemQty('${item.id}', ${item.qty - 1})">-</button>
                                    <input type="number" class="qty-input" value="${item.qty}" min="1" onchange="updateCartItemQty('${item.id}', this.value)">
                                    <button class="qty-btn" onclick="updateCartItemQty('${item.id}', ${item.qty + 1})">+</button>
                                    <button class="qty-btn" onclick="removeFromCart('${item.id}')" style="margin-right: auto;">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                
                cartFooter.style.display = 'block';
            }

            cartTotal.textContent = `${totalPrice.toFixed(2)} ${store.currency}`;
        }

        function showAddToCartFeedback() {
            // Simple visual feedback - you can enhance this
            const badge = document.getElementById('cartBadge');
            badge.style.transform = 'scale(1.3)';
            setTimeout(() => {
                badge.style.transform = 'scale(1)';
            }, 200);
        }

        function toggleCart() {
            const sidebar = document.getElementById('cartSidebar');
            const overlay = document.getElementById('cartOverlay');
            
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            document.body.style.overflow = sidebar.classList.contains('active') ? 'hidden' : '';
        }

        // WhatsApp Integration
        function buildWhatsAppMessage() {
            const lang = currentLang;
            const header = lang === 'fr'
                ? `🛒 *Nouvelle commande — ${store.name_fr || store.name_ar}*\n\n`
                : `🛒 *طلب جديد — ${store.name_ar}*\n\n`;

            let items = cart.map(item => {
                const name = lang === 'fr' && item.title_fr ? item.title_fr : item.title_ar;
                return `• ${name} × ${item.qty} — ${(item.price * item.qty).toFixed(2)} ${store.currency}`;
            }).join('\n');

            const total = cart.reduce((s, x) => s + x.price * x.qty, 0);
            const footer = lang === 'fr'
                ? `\n\n💰 *Total: ${total.toFixed(2)} ${store.currency}*\n\nMerci de confirmer la commande 🙏`
                : `\n\n💰 *الإجمالي: ${total.toFixed(2)} ${store.currency}*\n\nأرجو تأكيد الطلب 🙏`;

            return `https://wa.me/${store.whatsapp}?text=${encodeURIComponent(header + items + footer)}`;
        }

        function checkoutWhatsApp() {
            if (cart.length === 0) return;
            const url = buildWhatsAppMessage();
            window.open(url, '_blank');
        }

        function orderDirectWhatsApp() {
            if (!modalProduct) return;
            
            const lang = currentLang;
            const name = lang === 'fr' && modalProduct.title_fr ? modalProduct.title_fr : modalProduct.title_ar;
            const desc = lang === 'fr' && modalProduct.desc_fr ? modalProduct.desc_fr : modalProduct.desc_ar || '';
            
            const message = lang === 'fr'
                ? `🛒 *Demande de produit — ${store.name_fr || store.name_ar}*\n\n*${name}*\n${desc}\n💰 *Prix: ${modalProduct.price.toFixed(2)} ${store.currency}*\n\nJe suis intéressé par ce produit.`
                : `🛒 *طلب منتج — ${store.name_ar}*\n\n*${name}*\n${desc}\n💰 *السعر: ${modalProduct.price.toFixed(2)} ${store.currency}*\n\nأنا مهتم بهذا المنتج.`;
            
            const url = `https://wa.me/${store.whatsapp}?text=${encodeURIComponent(message)}`;
            window.open(url, '_blank');
        }

        // Language Toggle
        function toggleLanguage() {
            if (store.lang !== 'both') return;
            
            currentLang = currentLang === 'ar' ? 'fr' : 'ar';
            
            if (currentLang === 'fr') {
                document.documentElement.dir = 'ltr';
                document.documentElement.lang = 'fr';
                document.getElementById('langToggle').textContent = 'AR';
            } else {
                document.documentElement.dir = 'rtl';
                document.documentElement.lang = 'ar';
                document.getElementById('langToggle').textContent = 'FR';
            }
            
            updateStoreUI();
            renderProducts();
            updateCartUI();
        }

        // Utility
        function scrollToProducts() {
            document.getElementById('productsSection').scrollIntoView({ behavior: 'smooth' });
        }

        // Close modal on overlay click
        document.getElementById('productModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('productModal')) {
                closeProductModal();
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeProductModal();
                if (document.getElementById('cartSidebar').classList.contains('active')) {
                    toggleCart();
                }
            }
        });
    </script>
</body>
</html>
