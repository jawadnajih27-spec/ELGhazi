<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم ELGhazi</title>
    <style>
        body { font-family: sans-serif; background: #E6DDC4; padding: 20px; }
        .admin-box { background: white; padding: 20px; border-radius: 8px; max-width: 600px; margin: auto; }
        input, textarea, select { width: 100%; margin: 10px 0; padding: 10px; }
        button { background: #556B2F; color: white; border: none; padding: 10px 20px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2>إضافة محتوى جديد - ELGhazi</h2>
    
    <input type="password" id="gh-token" placeholder="أدخل مفتاح GitHub الخاص بك (ghp_...)">
    
    <select id="file-type">
        <option value="articles">مقال جديد (articles.json)</option>
        <option value="testimonies">شهادة جديدة (testimonies.json)</option>
    </select>

    <textarea id="json-content" rows="10" placeholder="ضع بيانات الـ JSON هنا..."></textarea>
    
    <button onclick="publishToGithub()">نشر الآن</button>
    <p id="status"></p>
</div>

<script>
async function publishToGithub() {
    const token = document.getElementById('gh-token').value;
    const type = document.getElementById('file-type').value;
    const content = document.getElementById('json-content').value;
    const status = document.getElementById('status');

    if(!token || !content) {
        alert("يرجى إدخال المفتاح والبيانات!");
        return;
    }

    status.innerText = "جاري الإرسال إلى GitHub...";

    // إرسال الإشارة لـ GitHub Actions
    try {
        const response = await fetch('https://api.github.com/repos/jawadnajih27-spec/ELGhazi/dispatches', {
            method: 'POST',
            headers: {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json'
            },
            body: JSON.stringify({
                event_type: 'update-json',
                client_payload: {
                    filename: type,
                    content: content
                }
            })
        });

        if (response.ok) {
            status.innerText = "✅ تم الإرسال بنجاح! سيقوم GitHub بتحديث الموقع خلال دقيقة.";
        } else {
            const err = await response.json();
            status.innerText = "❌ خطأ: " + err.message;
        }
    } catch (error) {
        status.innerText = "❌ فشل الاتصال بالـ API.";
    }
}
</script>

</body>
</html>
