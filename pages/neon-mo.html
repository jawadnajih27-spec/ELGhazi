<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Kufi Arabic',sans-serif;background:#020a1a;color:#e0f0ff;min-height:100vh;overflow-x:hidden;direction:rtl}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,255,0.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none}
nav{position:fixed;top:0;left:0;right:0;padding:14px 32px;display:flex;justify-content:space-between;align-items:center;background:rgba(2,10,26,0.8);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,255,255,0.1);z-index:100}
.logo{font-weight:900;font-size:20px;color:#00ffcc;text-shadow:0 0 20px #00ffcc,0 0 40px #00ffcc}
.nav-cta{background:transparent;border:1px solid #00ffcc;color:#00ffcc;font-weight:700;padding:10px 24px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:14px;text-decoration:none;transition:all .3s;text-shadow:0 0 10px #00ffcc;box-shadow:0 0 10px rgba(0,255,204,0.2),inset 0 0 10px rgba(0,255,204,0.05)}
.nav-cta:hover{background:rgba(0,255,204,0.1);box-shadow:0 0 30px rgba(0,255,204,0.5)}
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:100px 24px 60px;text-align:center;position:relative}
.glitch{font-size:clamp(40px,8vw,80px);font-weight:900;color:#00ffcc;text-shadow:0 0 20px #00ffcc,0 0 50px #00ffcc,0 0 80px #00ffcc;line-height:1.1;margin-bottom:20px;animation:glitch-anim 4s infinite}
@keyframes glitch-anim{0%,100%{text-shadow:0 0 20px #00ffcc,0 0 50px #00ffcc}10%{text-shadow:-2px 0 #ff0,2px 0 #f0f,0 0 40px #00ffcc}11%{text-shadow:2px 0 #ff0,-2px 0 #f0f,0 0 20px #00ffcc}}
.sub{font-size:clamp(15px,2vw,18px);color:rgba(224,240,255,0.6);line-height:1.7;margin-bottom:44px;max-width:500px;margin-left:auto;margin-right:auto}
.wa-btn{display:inline-flex;align-items:center;gap:10px;background:transparent;color:#00ffcc;padding:16px 40px;border-radius:12px;font-size:18px;font-weight:700;text-decoration:none;transition:all .3s;border:2px solid #00ffcc;text-shadow:0 0 10px #00ffcc;box-shadow:0 0 20px rgba(0,255,204,0.2),inset 0 0 20px rgba(0,255,204,0.05)}
.wa-btn:hover{background:rgba(0,255,204,0.1);box-shadow:0 0 40px rgba(0,255,204,0.5),0 0 80px rgba(0,255,204,0.2);transform:translateY(-3px)}
.feats{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-top:64px}
.feat{border:1px solid rgba(0,255,204,0.2);border-radius:16px;padding:24px;min-width:160px;max-width:200px;text-align:center;background:rgba(0,255,204,0.03);transition:all .3s}
.feat:hover{border-color:#00ffcc;box-shadow:0 0 20px rgba(0,255,204,0.2);transform:translateY(-4px)}
.feat-i{font-size:32px;margin-bottom:10px}
.feat-n{font-weight:700;font-size:14px;color:#00ffcc;margin-bottom:4px}
footer{text-align:center;padding:32px;border-top:1px solid rgba(0,255,204,0.1);color:rgba(224,240,255,0.3);font-size:12px}
